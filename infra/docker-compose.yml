services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tradingbot
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev","test","backtest"]

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: ["dev","test","backtest"]

  market-data-service:
    build:
      context: ..
      dockerfile: backend/market_data_service/Dockerfile
    ports: ["8001:8000"]
    environment:
      BOT_CONFIG_PATH: /app/config/bot.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: ["dev","test"]

  trading-service:
    build:
      context: ..
      dockerfile: backend/trading_service/Dockerfile
    ports: ["8002:8000"]
    environment:
      BOT_CONFIG_PATH: /app/config/bot.json
      LIVE_TRADING: "${LIVE_TRADING:-false}"
      I_UNDERSTAND_REAL_MONEY: "${I_UNDERSTAND_REAL_MONEY:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: ["dev","test"]

  strategy-service:
    build:
      context: ..
      dockerfile: backend/strategy_service/Dockerfile
    ports: ["8003:8000"]
    environment:
      BOT_CONFIG_PATH: /app/config/bot.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
    profiles: ["dev","test","backtest"]

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_MARKET_API: "http://localhost:8001"
      NEXT_PUBLIC_TRADING_API: "http://localhost:8002"
      NEXT_PUBLIC_STRATEGY_API: "http://localhost:8003"
    profiles: ["dev"]

volumes:
  pgdata:
